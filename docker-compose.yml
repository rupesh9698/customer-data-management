version: '3.8'

services:
  app:
    build: .
    ports:
      - "5424:5424"
    environment:
      - DATASOURCE_URL=jdbc:postgresql://db:5432/customer_data_management
      - DATASOURCE_USERNAME=postgres
      - DATASOURCE_PASSWORD=Pass@1234
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pass@1234
      POSTGRES_DB: customer_data_management
    ports:
      - "5432:5432"